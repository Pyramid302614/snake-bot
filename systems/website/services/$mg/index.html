<html>

    <head>
        <meta charset="UTF-8">
        <style>
            @font-face {
                font-family: reem_kufi;
                src: url("/$fs/$mg/assets/ReemKufi-Bold.ttf");
            }
            @font-face {
                font-family: dm_sans;
                src: url("/$fs/$mg/assets/DMSans_18pt-Light.ttf");
            }
        </style>
    </head>

    <body style="background-color:black">

        <span id="display" style="font-family:monospace;color:white;"></span>
        <canvas id="canvas" style="position:fixed;top:0;left:50%;top:50%;transform:translate(-50%,-50%);" width="50px" height="50px"></canvas>

        <!-- <div style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);"><img id="monologo" src="/monologo" width="100px" height="100px"></img></div> -->

        <script>
            
            function overrideDisplay(msg) {
                // document.getElementById("display").innerHTML = msg;
            }
            function log(msg,override) {
                console.log(msg);
                // document.getElementById("display").innerHTML += `<br/>[INF] ${msg}`;
            }
            function err(m) {
                console.error(m);
                document.getElementById("display").innerHTML += `<br/>[ERR] ${m}`;
            }

        </script>

        <script type="module" src="/script.mjs">

            

        </script>


        <script>
            
            document.addEventListener("DOMContentLoaded",() => {

                var mouseX = 0;
                var mouseY = 0;

                s&&script

                window.addEventListener("error",(e) => err(e.message));
                window.addEventListener("unhandledrejection",(r) => err(r.message));

                const canvas = document.getElementById("canvas");
                const g = canvas.getContext("2d");
                log("Fetched canvas: " + canvas);
                log("Fetched graphics context: " + g);

                const Adapter = adapter?.();
                if(!Adapter) {
                    log("Failed to fetch Snake Bot ME adapter");
                } else {
                    log("Fetched adapter!");//\n" + JSON.stringify(Adapter,null,2));
                }
                
                function fill(r,g_,b,a) {
                    if(a !== undefined) g.fillStyle = `rgba(${r},${g_},${b},${Math.round(a/255*100)/100})`;
                    else g.fillStyle = `rgb(${r},${g_},${b})`;
                }
                function noFill() {
                    // idek
                }
                function noStroke() {
                
                }
                function rect(x,y,w,h,r) {
                    if(!r) g.fillRect(x,y,w,h);
                    else {
                        g.beginPath();
                        g.roundRect(x,y,w,h,r);
                        g.fill();
                    }
                }
                function ellipse(x,y,w,h) {
                    g.beginPath();
                    g.ellipse(x,y,w/2,h/2,0,0,Math.PI*2);
                    g.fill();
                }
                function text(t,x,y) {
                    g.fillText(t,x,y);
                }
                var fontSize = 12;
                var fontFamily = "Arial";
                function textSize(s) {
                    fontSize = s;
                    updateFont();
                }
                function textFamily(f) {
                    fontFamily = f;
                    updateFont();
                }
                function updateFont() {
                    g.font = `${fontSize}px ${fontFamily}`;
                }
                function textWidth(t) {
                    return g.measureText(t).width;
                }

                var startupCompleted = false;
                var startupCompletedTimestamp = 0;
                let startupTimestamp = 0;
                var mgNameYOffset = [0,0]; // T, C
                var mgGoalYOffset = [0,0]; // T, C
                var mgInfoYOffset = [0,0]; // T, C;
                var mgNameOpacity = [1,1]; // T, C (0-1)
                var mgGoalOpacity = [1,1]; // T, C (0-1)
                var mgInfoOpacity = [1,1]; // T, C (0-1)
                const fadeToMg = true;
                function startupDraw() {

                    const now = Date.now();
                    let length = 10000;
                    if(now - startupTimestamp >= length) {
                        // document.getElementById("monologo").style.visibility = "hidden";
                        startupCompleted = true;
                        startupCompletedTimestamp = now;
                    } else {

                        const frac = (now - startupTimestamp) / length;
                        const perc = frac * 100;

                        if(perc >= 60) {
                            mgNameYOffset[0] = -30; mgNameOpacity[0] = 1;
                            mgGoalYOffset[0] = 60; mgGoalOpacity[0] = 0;
                            mgInfoYOffset[0] = 30; mgInfoOpacity[0] = 1;
                        } else if(perc >= 25) {
                            mgNameYOffset[0] = -30; mgNameOpacity[0] = 1;
                            mgGoalYOffset[0] = 30; mgGoalOpacity[0] = 1;
                            mgInfoYOffset[0] = 0; mgInfoOpacity[0] = 0;
                        } else {
                            mgNameYOffset[0] = 0; mgNameOpacity[0] = 1;
                            mgGoalYOffset[0] = 0; mgGoalOpacity[0] = 0;
                            mgInfoYOffset[0] = 0; mgInfoOpacity[0] = 0;
                            mgNameYOffset[1] = 0; mgNameOpacity[1] = 1;
                            mgGoalYOffset[1] = 0; mgGoalOpacity[1] = 0;
                            mgInfoYOffset[1] = 0; mgInfoOpacity[1] = 0;
                        }
                        
                        mgNameYOffset[1] += (mgNameYOffset[0]-mgNameYOffset[1])/10;
                        mgGoalYOffset[1] += (mgGoalYOffset[0]-mgGoalYOffset[1])/10;
                        mgInfoYOffset[1] += (mgInfoYOffset[0]-mgInfoYOffset[1])/10;
                        mgNameOpacity[1] += (mgNameOpacity[0]-mgNameOpacity[1])/10;
                        mgGoalOpacity[1] += (mgGoalOpacity[0]-mgGoalOpacity[1])/10;
                        mgInfoOpacity[1] += (mgInfoOpacity[0]-mgInfoOpacity[1])/10;


                        fill(0,0,0);
                        rect(0,0,canvas.width,canvas.height);

                        const textFill = 
                            fadeToMg
                            ? (((length - (now - startupTimestamp)) <= 2_000)
                                ? ((length - (now - startupTimestamp)) / 2_000 * 255)
                                : 255
                            )
                            : 255

                        fill(textFill,textFill,textFill,mgNameOpacity[1]*255);
                        textFamily("reem_kufi");
                        textSize(50*Adapter.scale);
                        text(Adapter.name,canvas.width/2-textWidth(Adapter.name)/2,canvas.height/2+((50/2+mgNameYOffset[1])*Adapter.scale));

                        fill(textFill,textFill,textFill,mgGoalOpacity[1]*255);
                        textFamily("dm_sans");
                        textSize(30*Adapter.scale);
                        text((Adapter.goalMsg),canvas.width/2-textWidth(Adapter.goalMsg)/2,canvas.height/2+((30/2+mgGoalYOffset[1])*Adapter.scale));

                        const lines = Adapter.info.split("<nl>");
                        textSize(30*Adapter.scale/(lines.length+(1-lines.length)/1.5));
                        for(var i = 0; i < lines.length; i++) {
                            fill(textFill,textFill,textFill,mgInfoOpacity[1]*255);
                            textFamily("dm_sans");
                            text((lines[i]),canvas.width/2-textWidth(lines[i])/2,canvas.height/2+((30/2+mgInfoYOffset[1]+(i*32/(lines.length+(1-lines.length)/1.5)))*Adapter.scale));
                        }
                    
                    }
                }

                function updateCanvasSize() {
                    canvas.width = Math.round(Math.min(Adapter.canvas[0]/Adapter.canvas[1]*window.innerHeight,window.innerWidth)/2)*2;
                    canvas.height = Math.round(Math.min(Adapter.canvas[1]/Adapter.canvas[0]*window.innerWidth,window.innerHeight)/2)*2;
                    Adapter.scale = window.innerWidth > window.innerHeight ? (canvas.height/Adapter.canvas[1]) : (canvas.width/Adapter.canvas[0]);
                }
                function getRelativePos(x,y,element) {
                    const rect = element.getBoundingClientRect();
                    return {
                        x: x - rect.left,
                        y: y - rect.top
                    };
                }
                async function loadCanvas() {

                    updateCanvasSize();

                    log("Loading platform");
                    Adapter.mobile = "&&platform" != "desktop";
                    log("Platform: &&platform");
                    log("Detected mobile: " + Adapter.mobile);

                    log("Starting boot screen");
                    startupTimestamp = Date.now();
                    await new Promise(resolve => { let i = setInterval(() => {
                    if(startupCompleted) { clearInterval(i); resolve(); }
                    else startupDraw(); 
                    }, 1000/60)});

                    log("Hooking event listeners");
                    window.addEventListener("resize",updateCanvasSize);
                    window.addEventListener("keydown",(k) => Adapter?.keyPressed?.(k.keyCode));
                    window.addEventListener("keyup",(k) => Adapter?.keyReleased?.(k.keyCode));
                    window.addEventListener("mousedown",(e) => {
                        const relative = getRelativePos(
                            e.clientX,
                            e.clientY,
                            document.getElementById("canvas")
                        );
                        mouseX = relative.x;
                        mouseY = relative.y;
                        Adapter?.mousePressed();
                        // log(mouseY + "," + document.getElementById('canvas').height)
                    });
                    window.addEventListener("mousemove",(e) => {
                        const relative = getRelativePos(
                            e.clientX,
                            e.clientY,
                            document.getElementById("canvas")
                        );
                        mouseX = relative.x;
                        mouseY = relative.y;
                    })
                    const touch = (e) => {
                        e.preventDefault();
                        const relative = getRelativePos(
                            e.touches[0].clientX,
                            e.touches[0].clientY,
                            document.getElementById("canvas")
                        );
                        mouseX = relative.x;
                        mouseY = relative.y;
                        Adapter?.mousePressed();
                    };
                    canvas.addEventListener("touchstart",touch,{passive:false}); // High cortisol
                    canvas.addEventListener("touchmove",(e) => {
                        e.preventDefault();
                        const relative = getRelativePos(
                            e.touches[0].clientX,
                            e.touches[0].clientY,
                            document.getElementById("canvas")
                        );
                        mouseX = relative.x;
                        mouseY = relative.y;
                    },{passive:false});

                    log("Migrated to minigame");
                    overrideDisplay("");
                    let pBackgroundSum = -1;
                    setInterval(() => {
                        Adapter.draw();
                        let bSum = Adapter.background[0]+Adapter.background[1]+Adapter.background[2];
                        if(bSum != pBackgroundSum) {
                            // log("update")
                            document.body.style.backgroundColor = `rgb(${Adapter.background[0]-(Adapter.background[0]-(255/2))/5},${Adapter.background[1]-(Adapter.background[1]-(255/2))/5},${Adapter.background[2]-(Adapter.background[2]-(255/2))/5})`;
                        }
                        pBackground = bSum;
                        const now = Date.now();
                        if(fadeToMg && now - startupCompletedTimestamp <= 2_000) {
                            const opacity = (now-startupCompletedTimestamp)/2_000;
                            fill(0,0,0,255-opacity*255);
                            document.body.style.backgroundColor = `rgb(${(Adapter.background[0]-(Adapter.background[0]-(255/2))/5)*opacity},${(Adapter.background[1]-(Adapter.background[1]-(255/2))/5)*opacity},${(Adapter.background[2]-(Adapter.background[2]-(255/2))/5)*opacity})`;
                            rect(0,0,Adapter.canvas[0],Adapter.canvas[1]);
                        }
                    } ,1000/Adapter.frameRate);

                }

                (async () => {
                    
                    try {

                        // log("Executing SDK startup delay");
                        // await new Promise(resolve => setTimeout(resolve,1_000));

                        const { DiscordSDK } = window;
                        var sdk = false;
                        var ws = false;
                        if(DiscordSDK) {
                            sdk = new DiscordSDK("&&clientid");
                            log("SDK ready function: " + (sdk.ready !== undefined));
                            log("Waiting for SDK dap...");
                            await sdk.ready();
                            log("SDK dapped ("+Math.floor(Math.random()*100)+"% resonant)");
                            console.log(sdk.guildId + ", " + sdk.instanceId)
                            if(sdk.guildId != "&&guildid" || sdk.instanceId != "&&instanceid") {
                                err("Error verifying URL IDs.");
                                return;
                            }
                            log("Verified URL IDs. Proceeding");

                            log("Configuring SDK");
                            sdk.commands.encourageHardwareAcceleration();

                        } else {
                            log ("(!) No SDK");
                            return;
                        }

                        if(Adapter) loadCanvas();

                        const r = await Adapter.report();
                        
                        fetch(`/$mg/report?guild_id=&&guildid&s=&&s_&user_id=&&userid&mobile=${"&&platform"!="desktop"}&data=${JSON.stringify(r)}`);

                    } catch(e) {
                        
                        err(e);
                    
                    }

                })();

            });

        </script>


    </body>
</html>
